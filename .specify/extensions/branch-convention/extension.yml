schema_version: "1.0"

extension:
  id: branch-convention
  name: "Branch Convention"
  version: "1.0.0"
  description: "Configurable branch and folder naming conventions for /specify with presets and custom patterns"
  author: "Quratulain-bilal"
  repository: "https://github.com/Quratulain-bilal/spec-kit-branch-convention"
  license: "MIT"

requires:
  speckit_version: ">=0.4.0"

provides:
  commands:
    - name: speckit.branch-convention.configure
      file: commands/speckit.branch-convention.configure.md
      description: "Set up branch and folder naming rules for the current project"
    - name: speckit.branch-convention.validate
      file: commands/speckit.branch-convention.validate.md
      description: "Check all feature branches and spec folders against the configured naming convention"
    - name: speckit.branch-convention.rename
      file: commands/speckit.branch-convention.rename.md
      description: "Rename non-compliant branches and spec folders to match the configured convention"

hooks:
  before_specify:
    command: speckit.branch-convention.validate
    optional: true
    prompt: "Validate branch naming convention before creating new feature?"
    description: "Check naming convention compliance before /specify creates a new branch"

tags:
  - "branch"
  - "naming"
  - "convention"
  - "gitflow"
  - "workflow"
