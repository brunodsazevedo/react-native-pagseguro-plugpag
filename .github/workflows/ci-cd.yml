name: CI/CD

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn typecheck

      - name: Run unit tests
        run: yarn test --maxWorkers=2 --coverage

      - name: Build library and plugin
        run: yarn prepare

  build-android:
    runs-on: ubuntu-latest

    env:
      TURBO_CACHE_DIR: .turbo/android

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache turborepo for Android
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-android-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-android-

      - name: Check turborepo cache for Android
        run: |
          TURBO_CACHE_STATUS=$(node -p "($(yarn turbo run build:android --cache-dir="${{ env.TURBO_CACHE_DIR }}" --dry=json)).tasks.find(t => t.task === 'build:android').cache.status")

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Install JDK
        if: env.turbo_cache_hit != 1
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Finalize Android SDK
        if: env.turbo_cache_hit != 1
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Build Expo config plugin
        if: env.turbo_cache_hit != 1
        run: yarn build:plugin

      - name: Prebuild expo app for Android
        if: env.turbo_cache_hit != 1
        run: |
          yarn example expo prebuild --platform android

      - name: Cache Gradle
        if: env.turbo_cache_hit != 1
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build example for Android
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        run: |
          yarn turbo run build:android --cache-dir="${{ env.TURBO_CACHE_DIR }}"

  cd:
    needs: [ci, build-android]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      # Second setup-node is required to configure .npmrc with registry-url,
      # which is needed for NODE_AUTH_TOKEN to work with npm publish.
      # The first setup (via composite action) handles yarn cache only.
      - name: Setup Node.js with npm registry
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - name: Build library and plugin
        run: yarn prepare

      - name: Verify build artifacts
        run: |
          if [ ! -d "lib" ]; then
            echo "ERROR: lib/ directory not found after build" >&2
            exit 1
          fi
          if [ ! -d "plugin/build" ]; then
            echo "ERROR: plugin/build/ directory not found after build" >&2
            exit 1
          fi
          echo "Build artifacts verified: lib/ and plugin/build/ present"

      - name: Check if version is already published
        id: version-check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Detect dist-tag from version identifier (e.g. 1.0.0-rc.1 → rc)
          if [[ "$VERSION" == *"-"* ]]; then
            PRE_ID=$(echo "$VERSION" | sed 's/.*-\([^.]*\).*/\1/')
            DIST_TAG="$PRE_ID"
          else
            DIST_TAG="latest"
          fi
          echo "dist_tag=$DIST_TAG" >> $GITHUB_OUTPUT

          # Skip publish silently if version is already on the registry (FR-003)
          PUBLISHED=$(npm view react-native-pagseguro-plugpag@"$VERSION" version 2>/dev/null || echo "")
          if [ -n "$PUBLISHED" ]; then
            echo "skip_publish=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already published — skipping publish"
          else
            echo "skip_publish=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not yet published with tag $DIST_TAG — proceeding"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.skip_publish != 'true'
        run: npm publish --provenance --access public --tag ${{ steps.version-check.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
